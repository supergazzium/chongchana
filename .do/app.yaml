name: chongjaroen-backend
region: sgp
services:
  - name: backend
    source_dir: packages/backend
    github:
      branch: main
      deploy_on_push: true
    # Use multi-stage Dockerfile for memory-efficient builds
    # Build happens on DO servers with plenty of RAM
    # Runtime uses only 512MB RAM (basic-xxs)
    dockerfile_path: packages/backend/Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
