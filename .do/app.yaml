name: chongjaroen-backend
region: sgp
services:
  - name: backend
    source_dir: packages/backend
    github:
      branch: main
      deploy_on_push: true
    # Explicitly use buildpack (omit dockerfile_path)
    # Skip admin build to save memory - admin UI served separately
    build_command: npm install --production=false
    run_command: npm run start
    environment_slug: node-js
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
